<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ali Keyboard</title>

<style>
:root{
    --bg:#121212;
    --key:#1e1e1e;
    --text:#ffffff;
    --accent:#00ffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background-size:cover;
    background-position:center;
    transition:0.3s;
    transition: background 0.8s,
            color 0.8s;
}

.keyboard-container{
    width:100%;
    max-width:700px;
    padding:15px;
    backdrop-filter:blur(10px);
    background:rgba(0,0,0,0.4);
    border-radius:20px;
}

.top-bar{
    display:flex;
    gap:10px;
    margin-bottom:15px;
    flex-wrap:wrap;
    <button onclick="toggleAutoTheme()">
AUTO RGB
</button>
}

.top-bar button,
.top-bar select{
    padding:10px;
    border:none;
    border-radius:12px;
    background:var(--key);
    color:var(--text);
}

textarea{
    width:100%;
    height:120px;
    border:none;
    border-radius:15px;
    padding:15px;
    margin-bottom:15px;
    resize:none;
    background:#ffffff10;
    color:white;
    font-size:18px;
}

.keyboard{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.row{
    display:flex;
    gap:8px;
    justify-content:center;
}

.key{
    flex:1;
    padding:16px;
    border:none;
    border-radius:14px;
    background:var(--key);
    color:var(--text);
    font-size:18px;
    cursor:pointer;
    transition:0.15s;
    box-shadow:0 0 10px #00000040;
    transition: 0.3s,
            background 0.8s,
            color 0.8s;
}

.key:hover{
    transform:scale(1.05);
}

.key:active{
    transform:scale(0.95);
}

.special{
    background:var(--accent);
    color:black;
    font-weight:bold;
}

.arrow-panel{
    margin-top:15px;
}

.arrow-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    width:220px;
    margin:auto;
}

.arrow-grid button{
    padding:15px;
    border:none;
    border-radius:14px;
    background:var(--key);
    color:var(--text);
    font-size:22px;
}

.hidden{
    visibility:hidden;
}

@media(max-width:600px){
    .key{
        padding:13px;
        font-size:16px;
    }
}
</style>
</head>
<body>

<div class="keyboard-container">

    <div class="top-bar">
        <select id="themeSelector">
            <option value="dark">Dark</option>
            <option value="blue">Blue Neon</option>
            <option value="red">Red Fire</option>
            <option value="green">Matrix</option>
        </select>

        <button onclick="toggleCaps()">CAPS</button>
        <button onclick="toggleEmoji()">😊 Emoji</button>
        <input type="file" id="bgUpload" accept="image/*">
    </div>

    <textarea id="output" placeholder="Tape ici..."></textarea>

    <div class="keyboard" id="keyboard"></div>

    <div class="arrow-panel">
        <div class="arrow-grid">
            <button class="hidden"></button>
            <button onclick="moveCursor('up')">▲</button>
            <button class="hidden"></button>

            <button onclick="moveCursor('left')">◀</button>
            <button onclick="moveCursor('down')">▼</button>
            <button onclick="moveCursor('right')">▶</button>
        </div>
    </div>

</div>

<script>
const keyboard = document.getElementById('keyboard');
const output = document.getElementById('output');
const themeSelector = document.getElementById('themeSelector');
const bgUpload = document.getElementById('bgUpload');

let isCaps = false;
let emojiMode = false;
let autoTheme = false;
let autoThemeInterval = null;

const themeList = [
    'dark',
    'blue',
    'red',
    'green'
];
const keys = [
    ['q','w','e','r','t','y','u','i','o','p'],
    ['a','s','d','f','g','h','j','k','l'],
    ['z','x','c','v','b','n','m'],
];

const emojis = ['😀','😂','😍','🔥','❤️','👍','🎮','😎','😭','🥶'];

function buildKeyboard(){
    keyboard.innerHTML = '';

    if(emojiMode){
        const row = document.createElement('div');
        row.className = 'row';

        emojis.forEach(e=>{
            const btn = createKey(e);
            row.appendChild(btn);
        });

        keyboard.appendChild(row);
    }
    else{
        keys.forEach(r=>{
            const row = document.createElement('div');
            row.className = 'row';

            r.forEach(letter=>{
                const btn = createKey(
                    isCaps ? letter.toUpperCase() : letter
                );
                row.appendChild(btn);
            });

            keyboard.appendChild(row);
        });
    }

    const lastRow = document.createElement('div');
    lastRow.className = 'row';

    const space = createSpecialKey('SPACE', ()=> insertText(' '));
    space.style.flex = '4';

    const backspace = createSpecialKey('⌫', backspaceText);
    const enter = createSpecialKey('ENTER', ()=> insertText('\n'));

    lastRow.appendChild(backspace);
    lastRow.appendChild(space);
    lastRow.appendChild(enter);

    keyboard.appendChild(lastRow);
}

function createKey(letter){
    const btn = document.createElement('button');
    btn.className = 'key';
    btn.textContent = letter;

    btn.onclick = ()=>{
        insertText(letter);
        vibrate();
    };

    return btn;
}

function createSpecialKey(text,action){
    const btn = document.createElement('button');
    btn.className = 'key special';
    btn.textContent = text;
    btn.onclick = action;
    return btn;
}

function insertText(text){
    const start = output.selectionStart;
    const end = output.selectionEnd;

    output.value =
        output.value.substring(0,start) +
        text +
        output.value.substring(end);

    output.selectionStart =
    output.selectionEnd = start + text.length;

    output.focus();
}

function backspaceText(){
    const start = output.selectionStart;
    const end = output.selectionEnd;

    if(start === end && start > 0){
        output.value =
            output.value.substring(0,start-1) +
            output.value.substring(end);

        output.selectionStart =
        output.selectionEnd = start - 1;
    }

    output.focus();
}

function toggleCaps(){
    isCaps = !isCaps;
    buildKeyboard();
}

function toggleEmoji(){
    emojiMode = !emojiMode;
    buildKeyboard();
}

function moveCursor(direction){
    let pos = output.selectionStart;

    if(direction === 'left'){
        pos = Math.max(0,pos-1);
    }

    if(direction === 'right'){
        pos = Math.min(output.value.length,pos+1);
    }

    output.selectionStart = pos;
    output.selectionEnd = pos;
    output.focus();
}

function vibrate(){
    if(navigator.vibrate){
        navigator.vibrate(25);
    }
}

const themes = {
    dark:{
        bg:'#121212',
        key:'#1e1e1e',
        text:'#ffffff',
        accent:'#00ffff'
    },

    blue:{
        bg:'#001b44',
        key:'#003399',
        text:'#ffffff',
        accent:'#00ffff'
    },

    red:{
        bg:'#330000',
        key:'#880000',
        text:'#ffffff',
        accent:'#ff4444'
    },

    green:{
        bg:'#001100',
        key:'#003300',
        text:'#00ff00',
        accent:'#00ff88'
    }
};

function applyTheme(name){
    const t = themes[name];

    document.documentElement.style.setProperty('--bg',t.bg);
    document.documentElement.style.setProperty('--key',t.key);
    document.documentElement.style.setProperty('--text',t.text);
    document.documentElement.style.setProperty('--accent',t.accent);

    localStorage.setItem('theme',name);
}
function toggleAutoTheme(){

    autoTheme = !autoTheme;

    if(autoTheme){

        let index = 0;

        autoThemeInterval = setInterval(()=>{

            applyTheme(themeList[index]);

            themeSelector.value =
                themeList[index];

            index++;

            if(index >= themeList.length){
                index = 0;
            }

        },2000);

    } else {

        clearInterval(autoThemeInterval);

    }
}
themeSelector.addEventListener('change',()=>{
    applyTheme(themeSelector.value);
});

bgUpload.addEventListener('change',function(e){
    const file = e.target.files[0];

    if(file){
        const reader = new FileReader();

        reader.onload = function(ev){
            document.body.style.backgroundImage =
                `url(${ev.target.result})`;

            localStorage.setItem(
                'bgImage',
                ev.target.result
            );
        }

        reader.readAsDataURL(file);
    }
});

window.onload = ()=>{
    buildKeyboard();

    const savedTheme =
        localStorage.getItem('theme');

    if(savedTheme){
        applyTheme(savedTheme);
        themeSelector.value = savedTheme;
    }

    const savedBg =
        localStorage.getItem('bgImage');

    if(savedBg){
        document.body.style.backgroundImage =
            `url(${savedBg})`;
    }
}
</script>

</body>
</html>

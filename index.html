<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>ALI KEYBOARD PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#030712;
  --surface:#0f172a;
  --key:#111827;
  --accent:#00f5ff;
  --accent2:#ff00ff;
  --text:#ffffff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  background:var(--bg);
  font-family:'Share Tech Mono', monospace;
  color:white;
  min-height:100vh;
  overflow:hidden;
}

.wrapper{
  display:flex;
  flex-direction:column;
  height:100vh;
  padding:8px;
  gap:8px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px;
}

.logo{
  font-family:'Orbitron', sans-serif;
  font-size:22px;
  font-weight:900;
  color:var(--accent);
}

.status{
  font-size:12px;
  color:#00ff99;
}

.toolbar{
  display:flex;
  gap:6px;
  overflow-x:auto;
  scrollbar-width:none;
}

.toolbar::-webkit-scrollbar{
  display:none;
}

.tb-btn,
.tb-select{
  border:none;
  outline:none;
  background:var(--key);
  color:white;
  padding:12px 14px;
  border-radius:14px;
  font-size:14px;
  white-space:nowrap;
}

.tb-btn:active{
  transform:scale(.95);
}

.output-box{
  background:var(--surface);
  border-radius:20px;
  overflow:hidden;
  border:1px solid #1f2937;
}

textarea{
  width:100%;
  height:120px;
  background:transparent;
  border:none;
  outline:none;
  resize:none;
  color:white;
  font-size:22px;
  padding:16px;
  font-family:'Share Tech Mono', monospace;
}

.keyboard{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  gap:6px;
}

.row{
  display:flex;
  gap:6px;
}

.key{
  flex:1;
  height:62px;
  border:none;
  border-radius:18px;
  background:var(--key);
  color:white;
  font-size:24px;
  font-weight:bold;
}

.key:active{
  transform:scale(.93);
}

.key-special{
  background:#172033;
  color:var(--accent);
}

.key-delete{
  background:#3a1010;
  color:#ff6666;
}

.key-send{
  background:linear-gradient(135deg,#00f5ff,#0080ff);
  color:black;
}

.key-space{
  flex:4;
  font-size:16px;
}

#toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#111827;
  color:white;
  padding:14px 22px;
  border-radius:30px;
  opacity:0;
  transition:.3s;
  pointer-events:none;
  z-index:9999;
}

#toast.show{
  opacity:1;
}

@media(max-width:500px){

.key{
  height:58px;
  font-size:22px;
}

textarea{
  font-size:20px;
}

}

</style>
</head>
<body>

<div class="wrapper">

<div class="header">
<div class="logo">ALI KEYBOARD</div>
<div class="status">ONLINE</div>
</div>

<div class="toolbar">

<select id="themeSelector" class="tb-select">
<option value="cyber">CYBER</option>
<option value="matrix">MATRIX</option>
<option value="fire">FIRE</option>
<option value="purple">PURPLE</option>
<option value="gold">GOLD</option>
<option value="ice">ICE</option>
</select>

<button class="tb-btn" onclick="toggleRGB()" id="rgbBtn">RGB</button>

<button class="tb-btn" onclick="copyText()">COPY</button>

<button class="tb-btn" onclick="clearText()">CLEAR</button>

<button class="tb-btn" onclick="toggleCaps()">CAPS</button>

</div>

<div class="output-box">
<textarea id="output" placeholder="Tape ton message..."></textarea>
</div>

<div class="keyboard" id="keyboard"></div>

</div>

<div id="toast"></div>

<script>

const output=document.getElementById('output');
const keyboard=document.getElementById('keyboard');

let caps=false;
let rgb=false;
let rgbInterval=null;

const rows=[
['q','w','e','r','t','y','u','i','o','p'],
['a','s','d','f','g','h','j','k','l'],
['z','x','c','v','b','n','m']
];

function vibrate(ms=25){

  if(navigator.vibrate){
    navigator.vibrate(ms);
  }

}

function toast(msg){

  const t=document.getElementById('toast');

  t.textContent=msg;

  t.classList.add('show');

  setTimeout(()=>{
    t.classList.remove('show');
  },1500);

}

function insertText(text){

  const start=output.selectionStart;
  const end=output.selectionEnd;

  output.value=
    output.value.substring(0,start)+
    text+
    output.value.substring(end);

  output.selectionStart=
  output.selectionEnd=
    start+text.length;

  output.focus();

}

function buildKeyboard(){

  keyboard.innerHTML='';

  rows.forEach(r=>{

    const row=document.createElement('div');
    row.className='row';

    r.forEach(letter=>{

      const key=document.createElement('button');

      key.className='key';

      key.textContent=
        caps ? letter.toUpperCase() : letter;

      key.addEventListener('touchstart',()=>{

        insertText(
          caps ? letter.toUpperCase() : letter
        );

        vibrate();

      });

      row.appendChild(key);

    });

    keyboard.appendChild(row);

  });

  const bottom=document.createElement('div');

  bottom.className='row';

  const space=createKey('SPACE',()=>{

    insertText(' ');

  });

  space.classList.add('key-space');

  const back=createKey('⌫',()=>{

    output.value=
      output.value.slice(0,-1);

  });

  back.classList.add('key-delete');

  const enter=createKey('↵',()=>{

    insertText('\n');

  });

  const send=createKey('SEND',()=>{

    sendText();

  });

  send.classList.add('key-send');

  bottom.appendChild(space);
  bottom.appendChild(back);
  bottom.appendChild(enter);
  bottom.appendChild(send);

  keyboard.appendChild(bottom);

}

function createKey(label,action){

  const btn=document.createElement('button');

  btn.className='key key-special';

  btn.textContent=label;

  btn.addEventListener('touchstart',()=>{

    vibrate(35);

    action();

  });

  return btn;

}

function toggleCaps(){

  caps=!caps;

  buildKeyboard();

  toast(
    caps ? 'MAJUSCULES' : 'minuscules'
  );

}

function copyText(){

  if(!output.value.trim()){

    toast('RIEN A COPIER');
    return;

  }

  navigator.clipboard.writeText(output.value);

  vibrate(60);

  toast('COPIÉ');

}

function clearText(){

  output.value='';

  vibrate(50);

  toast('EFFACÉ');

}

function sendText(){

  if(!output.value.trim()){

    toast('RIEN A ENVOYER');
    return;

  }

  const text=
    encodeURIComponent(output.value);

  vibrate(90);

  if(navigator.share){

    navigator.share({
      text:output.value
    });

  }else{

    location.href=
    `sms:?body=${text}`;

  }

  toast('ENVOI...');

}

function toggleRGB(){

  rgb=!rgb;

  const btn=
  document.getElementById('rgbBtn');

  if(rgb){

    btn.style.background=
    'linear-gradient(90deg,red,orange,yellow,green,blue,purple)';

    let hue=0;

    rgbInterval=setInterval(()=>{

      document
      .querySelectorAll('.key')
      .forEach((k,i)=>{

        k.style.border=
        `2px solid hsl(${hue+i*10},100%,50%)`;

      });

      hue+=5;

    },200);

    toast('RGB ON');

  }else{

    clearInterval(rgbInterval);

    document
    .querySelectorAll('.key')
    .forEach(k=>{

      k.style.border='none';

    });

    btn.style.background='var(--key)';

    toast('RGB OFF');

  }

}

const themes={

cyber:{
bg:'#030712',
surface:'#0f172a',
key:'#111827',
accent:'#00f5ff'
},

matrix:{
bg:'#000a00',
surface:'#001400',
key:'#002200',
accent:'#00ff00'
},

fire:{
bg:'#1a0000',
surface:'#220000',
key:'#330000',
accent:'#ff5500'
},

purple:{
bg:'#13001f',
surface:'#1b002d',
key:'#2d0050',
accent:'#bb00ff'
},

gold:{
bg:'#1a1400',
surface:'#2a2000',
key:'#443300',
accent:'#ffd700'
},

ice:{
bg:'#001422',
surface:'#002033',
key:'#003355',
accent:'#88ddff'
}

};

function applyTheme(name){

  const t=themes[name];

  document.documentElement
  .style.setProperty('--bg',t.bg);

  document.documentElement
  .style.setProperty('--surface',t.surface);

  document.documentElement
  .style.setProperty('--key',t.key);

  document.documentElement
  .style.setProperty('--accent',t.accent);

  localStorage.setItem(
    'ali_theme',
    name
  );

}

document
.getElementById('themeSelector')
.addEventListener('change',function(){

  applyTheme(this.value);

});

const savedTheme=
localStorage.getItem('ali_theme')
|| 'cyber';

applyTheme(savedTheme);

document.getElementById(
'themeSelector'
).value=savedTheme;

buildKeyboard();

</script>

</body>
</html>

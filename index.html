<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<title>ALI KEYBOARD ULTRA</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#030712;
  --surface:#0d1117;
  --key:#111827;
  --border:#1f2937;
  --accent:#00f5ff;
  --accent2:#ff00ff;
  --text:#e2e8f0;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Share Tech Mono', monospace;
  min-height:100vh;
  padding:10px;
}

.wrapper{
  max-width:900px;
  margin:auto;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.logo{
  font-size:22px;
  font-family:'Orbitron', sans-serif;
  color:var(--accent);
  font-weight:900;
}

.status{
  font-size:12px;
  color:#00ff99;
}

.toolbar{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-bottom:10px;
}

.tb-btn,
.tb-select{
  border:none;
  outline:none;
  background:var(--key);
  color:white;
  padding:10px 14px;
  border-radius:10px;
  font-size:14px;
  cursor:pointer;
}

.tb-btn:active{
  transform:scale(.95);
}

.output-wrapper{
  background:var(--surface);
  border-radius:14px;
  overflow:hidden;
  margin-bottom:10px;
  border:1px solid var(--border);
}

textarea{
  width:100%;
  min-height:100px;
  background:transparent;
  border:none;
  outline:none;
  color:white;
  resize:none;
  padding:14px;
  font-size:20px;
  font-family:'Share Tech Mono', monospace;
}

.keyboard{
  display:flex;
  flex-direction:column;
  gap:5px;
}

.row{
  display:flex;
  gap:5px;
}

.key{
  flex:1;
  height:52px;
  border:none;
  border-radius:12px;
  background:var(--key);
  color:white;
  font-size:20px;
  cursor:pointer;
}

.key:active{
  transform:scale(.93);
  background:#1e293b;
}

.key-special{
  background:#162033;
  color:var(--accent);
}

.key-delete{
  background:#330d0d;
  color:#ff6666;
}

.key-enter{
  background:#003344;
  color:#00f5ff;
}

.key-space{
  flex:4;
}

#toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  color:white;
  padding:12px 20px;
  border-radius:20px;
  font-size:14px;
  opacity:0;
  transition:.3s;
  pointer-events:none;
}

#toast.show{
  opacity:1;
}

@media(max-width:500px){

.key{
  height:48px;
  font-size:18px;
}

textarea{
  font-size:18px;
}

}

</style>
</head>
<body>

<div class="wrapper">

<div class="header">
<div class="logo">ALI KEYBOARD</div>
<div class="status">ONLINE</div>
</div>

<div class="toolbar">

<select class="tb-select" id="themeSelector">
<option value="cyber">CYBER</option>
<option value="matrix">MATRIX</option>
<option value="fire">FIRE</option>
<option value="purple">PURPLE</option>
<option value="gold">GOLD</option>
<option value="ice">ICE</option>
</select>

<button class="tb-btn" onclick="toggleRGB()" id="rgbBtn">RGB</button>

<button class="tb-btn" onclick="copyText()">COPY</button>

<button class="tb-btn" onclick="clearText()">CLEAR</button>

<button class="tb-btn" onclick="sendText()">SEND</button>

</div>

<div class="output-wrapper">
<textarea id="output" placeholder="Tape ici..."></textarea>
</div>

<div class="keyboard" id="keyboard"></div>

</div>

<div id="toast"></div>

<script>

const output = document.getElementById("output");
const keyboard = document.getElementById("keyboard");

let caps = false;
let rgb = false;
let rgbInterval = null;

const rows = [
['q','w','e','r','t','y','u','i','o','p'],
['a','s','d','f','g','h','j','k','l'],
['z','x','c','v','b','n','m']
];

function vibrate(ms=20){
  if(navigator.vibrate){
    navigator.vibrate(ms);
  }
}

function showToast(msg){
  const toast=document.getElementById("toast");
  toast.textContent=msg;
  toast.classList.add("show");

  setTimeout(()=>{
    toast.classList.remove("show");
  },1500);
}

function insertText(text){

  const start=output.selectionStart;
  const end=output.selectionEnd;

  output.value=
    output.value.substring(0,start)+
    text+
    output.value.substring(end);

  output.selectionStart=
  output.selectionEnd=
    start+text.length;

  output.focus();

}

function buildKeyboard(){

  keyboard.innerHTML='';

  rows.forEach(r=>{

    const row=document.createElement('div');
    row.className='row';

    r.forEach(k=>{

      const key=document.createElement('button');

      key.className='key';

      key.textContent=
        caps ? k.toUpperCase() : k;

      key.addEventListener('touchstart',()=>{

        insertText(
          caps ? k.toUpperCase() : k
        );

        vibrate();

      });

      row.appendChild(key);

    });

    keyboard.appendChild(row);

  });

  const bottom=document.createElement('div');
  bottom.className='row';

  const shift=createSpecial('⇧',()=>{

    caps=!caps;
    buildKeyboard();

  });

  const space=createSpecial('SPACE',()=>{

    insertText(' ');

  });

  space.classList.add('key-space');

  const del=createSpecial('⌫',()=>{

    output.value=
      output.value.slice(0,-1);

  });

  del.classList.add('key-delete');

  const enter=createSpecial('↵',()=>{

    insertText('\n');

  });

  enter.classList.add('key-enter');

  bottom.appendChild(shift);
  bottom.appendChild(space);
  bottom.appendChild(del);
  bottom.appendChild(enter);

  keyboard.appendChild(bottom);

}

function createSpecial(label,action){

  const btn=document.createElement('button');

  btn.className='key key-special';

  btn.textContent=label;

  btn.addEventListener('touchstart',()=>{

    vibrate(30);

    action();

  });

  return btn;

}

function copyText(){

  if(!output.value.trim()){

    showToast('RIEN A COPIER');
    return;

  }

  navigator.clipboard.writeText(output.value);

  showToast('COPIÉ');

  vibrate(50);

}

function clearText(){

  output.value='';

  showToast('EFFACÉ');

  vibrate(40);

}

function sendText(){

  if(!output.value.trim()){

    showToast('RIEN A ENVOYER');
    return;

  }

  const text=
    encodeURIComponent(output.value);

  vibrate(80);

  if(navigator.share){

    navigator.share({
      text:output.value
    });

  }else{

    window.location.href=
      `sms:?body=${text}`;

  }

  showToast('ENVOI...');

}

const themes={

cyber:{
bg:'#030712',
surface:'#0d1117',
key:'#111827',
accent:'#00f5ff'
},

matrix:{
bg:'#000a00',
surface:'#001400',
key:'#002200',
accent:'#00ff00'
},

fire:{
bg:'#1a0000',
surface:'#220000',
key:'#330000',
accent:'#ff5500'
},

purple:{
bg:'#13001f',
surface:'#1b002d',
key:'#2d0050',
accent:'#bb00ff'
},

gold:{
bg:'#1a1400',
surface:'#2a2000',
key:'#443300',
accent:'#ffd700'
},

ice:{
bg:'#001422',
surface:'#002033',
key:'#003355',
accent:'#88ddff'
}

};

function applyTheme(name){

  const t=themes[name];

  document.documentElement.style
  .setProperty('--bg',t.bg);

  document.documentElement.style
  .setProperty('--surface',t.surface);

  document.documentElement.style
  .setProperty('--key',t.key);

  document.documentElement.style
  .setProperty('--accent',t.accent);

  localStorage.setItem(
    'ali_theme',
    name
  );

}

document
.getElementById('themeSelector')
.addEventListener('change',function(){

  applyTheme(this.value);

});

function toggleRGB(){

  rgb=!rgb;

  const btn=
  document.getElementById('rgbBtn');

  if(rgb){

    btn.style.background='linear-gradient(90deg,red,orange,yellow,green,blue,purple)';

    let hue=0;

    rgbInterval=setInterval(()=>{

      document
      .querySelectorAll('.key')
      .forEach((k,i)=>{

        k.style.border=
        `2px solid hsl(${hue+i*10},100%,50%)`;

      });

      hue+=5;

    },180);

    showToast('RGB ON');

  }else{

    clearInterval(rgbInterval);

    document
    .querySelectorAll('.key')
    .forEach(k=>{

      k.style.border='none';

    });

    btn.style.background='var(--key)';

    showToast('RGB OFF');

  }

}

const savedTheme=
localStorage.getItem('ali_theme')
|| 'cyber';

applyTheme(savedTheme);

document.getElementById(
'themeSelector'
).value=savedTheme;

buildKeyboard();

</script>

</body>
</html>
